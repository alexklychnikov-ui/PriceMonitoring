services:
  db:
    image: postgres:15-alpine
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: price_monitor
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups/postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d price_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file:
      - ../.env
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 2
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD}@db:5432/price_monitor
      REDIS_URL: redis://redis:6379/0
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID}
      PROXY_API_KEY: ${PROXY_API_KEY}
      PROXY_BASE_URL: ${PROXY_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      LLM_PROVIDER: ${LLM_PROVIDER}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      PARSE_INTERVAL_HOURS: ${PARSE_INTERVAL_HOURS}
      PRICE_ALERT_THRESHOLD_PCT: ${PRICE_ALERT_THRESHOLD_PCT}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file:
      - ../.env
    command: celery -A scheduler.celery_app worker --loglevel=info -Q scraping,analysis,notifications -c 2
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD}@db:5432/price_monitor
      REDIS_URL: redis://redis:6379/0
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID}
      PROXY_API_KEY: ${PROXY_API_KEY}
      PROXY_BASE_URL: ${PROXY_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      LLM_PROVIDER: ${LLM_PROVIDER}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      PARSE_INTERVAL_HOURS: ${PARSE_INTERVAL_HOURS}
      PRICE_ALERT_THRESHOLD_PCT: ${PRICE_ALERT_THRESHOLD_PCT}
      CELERY_WORKER: "1"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file:
      - ../.env
    command: celery -A scheduler.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD}@db:5432/price_monitor
      REDIS_URL: redis://redis:6379/0
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID}
      PROXY_API_KEY: ${PROXY_API_KEY}
      PROXY_BASE_URL: ${PROXY_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      LLM_PROVIDER: ${LLM_PROVIDER}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      PARSE_INTERVAL_HOURS: ${PARSE_INTERVAL_HOURS}
      PRICE_ALERT_THRESHOLD_PCT: ${PRICE_ALERT_THRESHOLD_PCT}
      CELERY_WORKER: "1"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  telegram_bot:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file:
      - ../.env
    command: python -m notifications.telegram_bot
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD}@db:5432/price_monitor
      REDIS_URL: redis://redis:6379/0
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID}
      PROXY_API_KEY: ${PROXY_API_KEY}
      PROXY_BASE_URL: ${PROXY_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      LLM_PROVIDER: ${LLM_PROVIDER}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      PARSE_INTERVAL_HOURS: ${PARSE_INTERVAL_HOURS}
      PRICE_ALERT_THRESHOLD_PCT: ${PRICE_ALERT_THRESHOLD_PCT}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  flower:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file:
      - ../.env
    command: celery -A scheduler.celery_app flower --port=5555 --basic_auth=${FLOWER_USER}:${FLOWER_PASSWORD}
    ports:
      - "5555:5555"
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ../frontend/dist:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.3
    env_file:
      - ../.env
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_ALERTING_ENABLED: "false"
      GF_UNIFIED_ALERTING_ENABLED: "false"
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower:latest
    command: --cleanup --interval 300
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DOCKER_API_VERSION: "1.43"
      WATCHTOWER_HTTP_API_UPDATE: "false"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
