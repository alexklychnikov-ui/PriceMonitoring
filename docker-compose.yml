services:
  db:
    image: postgres:15
    container_name: price_monitor_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: price_monitor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d price_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: price_monitor_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    image: python:3.11-slim
    container_name: price_monitor_app
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD}@db:5432/price_monitor
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "-c", "pip install --no-cache-dir -r requirements.txt && python -m uvicorn api.main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8000:8000"

  telegram_bot:
    image: python:3.11-slim
    container_name: price_monitor_telegram_bot
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD}@db:5432/price_monitor
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "-c", "pip install --no-cache-dir -r requirements.txt && python -m notifications.telegram_bot"]

  flower:
    image: mher/flower:2.0.1
    container_name: price_monitor_flower
    restart: unless-stopped
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      FLOWER_PORT: "5555"
      FLOWER_BASIC_AUTH: "${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-change_me}"
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:5555:5555"

volumes:
  postgres_data:
  redis_data:
