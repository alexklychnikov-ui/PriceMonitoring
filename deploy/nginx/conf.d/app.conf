upstream api_backend {
    server api:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name alexklyvibe.ru;

    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name alexklyvibe.ru;

    ssl_certificate /etc/letsencrypt/live/alexklyvibe.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alexklyvibe.ru/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        gzip_static on;
        expires 1d;
    }

    location /api/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    location = /docs {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /openapi.json {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /redoc {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

